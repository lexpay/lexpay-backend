# Config file for [Air](https://github.com/cosmtrek/air) in TOML format

# Working directory
# . or absolute path, please note that the directories following must be under root.
root = "."
tmp_dir = "tmp"

[build]
  # Just plain old shell command. You could use `make` as well.
  cmd = "go build -o .\\tmp\\main.exe .\\cmd\\api"
  # Binary file yields from `cmd`.
  bin = ".\\tmp\\main.exe"
  # Customize binary, can setup environment variables when run your app.
  # full_bin = ".\\tmp\\main.exe"
  # Watch these filename extensions.
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  # Ignore these filename extensions or directories.
  exclude_dir = ["assets", "tmp", "vendor", "testdata", ".git"]
  # Watch these directories if you specified.
  include_dir = []
  # Watch these files.
  include_file = []
  # Exclude files.
  exclude_file = []
  # Exclude specific regular expressions.
  exclude_regex = ["_test.go"]
  # Exclude unchanged files.
  exclude_unchanged = false
  # Follow symlink for directories
  follow_symlink = false
  # This log file places in your tmp_dir.
  log = "build-errors.log"
  # Poll files for changes instead of using fsnotify.
  poll = false
  # Poll interval (unit: ms).
  poll_interval = 0
  # It's not necessary to trigger build each time file changes if it's too frequent.
  delay = 1000 # ms
  # Stop running old binary when build errors occur.
  stop_on_error = true
  # Send Interrupt signal before killing process (windows does not support this signal)
  send_interrupt = false
  # Delay after sending Interrupt signal
  kill_delay = 500 # ms
  # Rerun binary or not
  rerun = false
  # Delay after rerun
  rerun_delay = 500

[log]
  # Show log time
  time = false
  # Only show main log (not watcher, build, etc.)
  main_only = false

[color]
  # Customize each part's color. If no color found, use the default theme.
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
