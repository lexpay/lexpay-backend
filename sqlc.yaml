version: "2"
sql:
  - schema: "internals/db/migrations"
    queries: "internals/db/queries"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internals/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: true
